name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Typecheck, build, and package QA
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Debian packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y apt-utils dpkg-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run check

      - name: Build CLI and core
        run: npm run build

      - name: Build Electron renderer
        run: npm run build:gui

      - name: Run path torture test
        run: npm run test:path-torture

      - name: Build Debian package
        run: npm run build:deb

      - name: QA Debian package contents
        run: npm run qa:deb

      - name: Generate checksums
        run: npm run checksums

      - name: Build APT repository metadata
        run: npm run build:apt-repo

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: winnest-release-artifacts
          path: |
            release/*.deb
            release/SHA256SUMS
            release/apt/dists/stable/Release
            release/apt/dists/stable/main/binary-amd64/Packages
            release/apt/dists/stable/main/binary-amd64/Packages.gz
          if-no-files-found: error
